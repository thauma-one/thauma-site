[build]
  command = "npm run build"
  publish = "_site"

# Geo-based language detection on the root path only.
[[edge_functions]]
  path = "/"
  function = "lang-redirect"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
